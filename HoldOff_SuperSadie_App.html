let currentProvider = null;
let failedProviders = new Set();

function getActiveProviders(){
  return AI_PROVIDERS.filter(p => data.aiKeys[p.id]);
}

async function callAI(prompt){
  const active = getActiveProviders().filter(p => !failedProviders.has(p.id));
  if(!active.length){
    failedProviders.clear();
    return "⚠️ No AI providers configured yet! Go to ⚡ Super Sadie AI tab to add your free API keys. Each one takes about 30 seconds to set up — and they're all FREE tier!";
  }
  // Rotate through providers
  const shuffled = [...active].sort(() => Math.random() - 0.5);
  for(const provider of shuffled){
    try{
      const key = data.aiKeys[provider.id];
      const req = provider.buildReq(key, prompt);
      const resp = await fetch(req.url, {
        method:'POST',
        headers:req.headers||{'Content-Type':'application/json'},
        body:JSON.stringify(req.body)
      });
      if(!resp.ok) throw new Error(`${resp.status}`);
      const json = await resp.json();
      const text = provider.parseRes(json);
      if(!text) throw new Error('Empty response');
      currentProvider = provider.name;
      failedProviders.delete(provider.id);
      return text;
    }catch(e){
      console.warn(`${provider.name} failed:`, e.message);
      failedProviders.add(provider.id);
      continue;
    }
  }
  failedProviders.clear();
  return "All AI providers are temporarily busy. Please try again in a moment! 💛";
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

async function sendChat(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML += `<div class="chat-msg user">${escHtml(text)}</div>`;
  msgs.innerHTML += `<div class="chat-msg ai" id="typingIndicator"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
  
  data.chatHistory = data.chatHistory||[];
  data.chatHistory.push({role:'user',text});
  
  // Build context-aware prompt
  const context = `Current HoldOff data snapshot:
- Tasks: ${data.tasks.length} total, ${data.tasks.filter(t=>t.status==='done').length} done
- Revenue: $${data.finances.revenue.reduce((s,r)=>s+r.amount,0).toLocaleString()}
- Expenses: $${data.finances.expenses.reduce((s,r)=>s+r.amount,0).toLocaleString()}
- Waitlist: ${data.metrics.waitlist}
- Active campaigns: ${data.campaigns.filter(c=>c.status==='active').length}
- Funding pipeline: $${data.fundraising.reduce((s,f)=>s+f.amount,0).toLocaleString()}
- Open tasks: ${data.tasks.filter(t=>t.status!=='done').map(t=>t.title).join(', ')}

User question: ${text}`;
  
  const response = await callAI(context);
  
  const typing = document.getElementById('typingIndicator');
  if(typing) typing.remove();
  
  msgs.innerHTML += `<div class="chat-msg ai">${escHtml(response)}${currentProvider?`<div class="provider">via ${currentProvider}</div>`:''}</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  
  data.chatHistory.push({role:'ai',text:response,provider:currentProvider});
  if(data.chatHistory.length > 100) data.chatHistory = data.chatHistory.slice(-100);
  saveData();
}

function saveTask(id){

function showNoteModal(note){
  const n=note||{title:'',cat:'General',content:''};
  openModal(`<h3>${note?'Edit':'New'} Note</h3>
  <div class="field"><label>Title</label><input id="nt_title" value="${escHtml(n.title)}"></div>
  <div class="field"><label>Category</label><select id="nt_cat"><option ${n.cat==='General'?'selected':''}>General</option><option ${n.cat==='Operations'?'selected':''}>Operations</option><option ${n.cat==='Fundraising'?'selected':''}>Fundraising</option><option ${n.cat==='Marketing'?'selected':''}>Marketing</option><option ${n.cat==='Product'?'selected':''}>Product</option><option ${n.cat==='Tech'?'selected':''}>Tech</option></select></div>
  <div class="field"><label>Content</label><textarea id="nt_content" style="min-height:150px">${escHtml(n.content)}</textarea></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
    <button class="btn btn-o" onclick="closeModal()">Cancel</button>
    <button class="btn btn-p" onclick="saveNote(${note?note.id:0})">Save</button></div>`);
}
function saveNote(id){
  const title=document.getElementById('nt_title').value.trim();if(!title)return;
  const obj={title,cat:document.getElementById('nt_cat').value,content:document.getElementById('nt_content').value,date:new Date().toISOString().slice(0,10)};
  if(id){const n=data.notes.find(n=>n.id===id);if(n)Object.assign(n,obj)}
  else{obj.id=genId(data.notes);data.notes.push(obj)}
  saveData();closeModal();renderNotes(document.getElementById('content'));
}
function editNote(id){showNoteModal(data.notes.find(n=>n.id===id))}
function deleteNote(id){data.notes=data.notes.filter(n=>n.id!==id);saveData();renderNotes(document.getElementById('content'))}

function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`holdoff_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{data=JSON.parse(ev.target.result);saveData();renderPage();alert('Data imported successfully!')}
    catch(e){alert('Invalid file format')}
  };reader.readAsText(file);
}
function resetData(){if(confirm('Reset ALL data to defaults? This cannot be undone!')){data=JSON.parse(JSON.stringify(DEFAULT_DATA));saveData();renderPage()}}

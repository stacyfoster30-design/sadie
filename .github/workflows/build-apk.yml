# 💜 Build Sadie's Android APK on GitHub-hosted runners.
# GitHub runners can reach the Android SDK/NDK and Apache Ant download
# servers, so buildozer can fetch the full toolchain here (unlike sandboxes
# where dl.google.com / archive.apache.org are firewall-blocked).
name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git zip unzip \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libtinfo6 \
            cmake libffi-dev libssl-dev

      - name: Install buildozer
        run: pip install --upgrade buildozer cython

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Cache buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ hashFiles('buildozer.spec') }}

      - name: Build debug APK
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sadie-debug-apk
          path: bin/*.apk
          if-no-files-found: error

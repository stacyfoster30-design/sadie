# 💜 Build Sadie's Android APK on GitHub-hosted runners.
# GitHub runners can reach the Android SDK/NDK and Apache Ant download
# servers, so buildozer can fetch the full toolchain here (unlike sandboxes
# where dl.google.com / archive.apache.org are firewall-blocked).
name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git zip unzip \
            autoconf automake libtool libtool-bin pkg-config \
            zlib1g-dev libncurses-dev libtinfo6 \
            cmake libffi-dev libssl-dev
          # python-for-android's libffi recipe uses an old configure.ac that calls
          # LT_SYS_SYMBOL_USCORE (a libtool-internal m4_defun macro).  autoconf 2.71+
          # on Ubuntu 24 treats unrecognised m4_defun macros as fatal errors.
          # Work around by wrapping autoconf so autoreconf sees --warnings=no-error,
          # which demotes the "possibly undefined macro" check from fatal → warning.
          printf '#!/bin/bash\nexec /usr/bin/autoconf --warnings=no-error "$@"\n' | \
            sudo tee /usr/local/bin/autoconf > /dev/null
          sudo chmod +x /usr/local/bin/autoconf

      - name: Install buildozer
        run: pip install --upgrade buildozer cython

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: v1-buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Cache buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: v1-buildozer-local-${{ hashFiles('buildozer.spec') }}

      - name: Build debug APK
        env:
          AUTOCONF: /usr/local/bin/autoconf
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sadie-debug-apk
          path: bin/*.apk
          if-no-files-found: error
